  <text x="505" y="367" text-anchor="middle" class="t-h">ssf 8 子命令：state · guard · sync · inject · version · config · doctor · build</text>
  <text x="505" y="385" text-anchor="middle" class="t-b">状态机读写 · SHA256 哈希校验 · 工件存在性验证 · 版本/配置/健康检查</text>
  <text x="505" y="401" text-anchor="middle" class="t-b">guard.mjs 五维度硬门禁（exit≠0 即 BLOCK）</text>
  <line x1="505" y1="410" x2="505" y2="422" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a-gray)"/>
