  <rect x="30" y="540" width="945" height="100" rx="10" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="48" y="562" class="t-h">运行时协作链路（5 步）</text>
  <text x="48" y="586" class="t-h" fill="#1e3a8a">① 会话启动</text>
  <text x="48" y="603" class="t-b">hooks 注入 orchestrator 全文</text>
  <text x="236" y="586" class="t-h" fill="#1e3a8a">② orchestrator</text>
  <text x="236" y="603" class="t-b">读工件 + ssf state get / guard.mjs check 决定路由</text>
  <text x="424" y="586" class="t-h" fill="#1e3a8a">③ guard.mjs</text>
  <text x="424" y="603" class="t-b">调 dist/ Validator 做 schema-valid 维度检查</text>
  <text x="612" y="586" class="t-h" fill="#1e3a8a">④ skill 产/消工件</text>
  <text x="612" y="603" class="t-b">bridge-contract 生成 contract → ssf state init 写哈希</text>
  <text x="800" y="586" class="t-h" fill="#1e3a8a">⑤ closure</text>
  <text x="800" y="603" class="t-b">ssf state transition closing → ssf sync</text>
  <text x="48" y="628" class="t-b" fill="#6b21a8">⚠ 铁律直引：NO PRODUCTION CODE WITHOUT A FAILING TEST FIRST ｜ NO FIXES WITHOUT ROOT CAUSE FIRST ｜ NO COMPLETION CLAIMS WITHOUT FRESH VERIFICATION EVIDENCE</text>
