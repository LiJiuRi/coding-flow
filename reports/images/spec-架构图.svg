  <text x="882" y="219" text-anchor="middle" class="t-b">• 26 个状态字段</text>
  <text x="882" y="237" text-anchor="middle" class="t-b">• SHA256 哈希（防篡改）</text>
  <text x="882" y="255" text-anchor="middle" class="t-b">• 当前 state + contract hash</text>
  <text x="882" y="273" text-anchor="middle" class="t-b">• 双层过时检测</text>
