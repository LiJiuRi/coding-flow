  <text x="410" y="118" text-anchor="middle" class="t-b" fill="#9a3412">templates/spec.md</text>
  <rect x="306" y="132" width="208" height="44" rx="6" fill="#ffffff" stroke="#fed7aa"/>
  <text x="410" y="150" text-anchor="middle" class="t-sec" font-weight="600">翻译 7 规则（spec.md:86-93）</text>
  <text x="410" y="166" text-anchor="middle" class="t-b">规格语言 → 实现交接语言</text>
  <text x="410" y="196" text-anchor="middle" class="t-b" fill="#9a3412">↓ 强制 12 段结构 ↓</text>
  <rect x="306" y="210" width="208" height="20" rx="4" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="314" y="224" class="t-sec">## Project Context</text>
  <rect x="306" y="233" width="208" height="20" rx="4" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="314" y="247" class="t-sec">## Applicable OpenSpec Rules</text>
  <rect x="306" y="256" width="208" height="20" rx="4" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="314" y="270" class="t-sec">## Goal / Non-Goals</text>
  <rect x="306" y="279" width="208" height="20" rx="4" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
