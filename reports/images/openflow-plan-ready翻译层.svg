  <path d="M 720 120 L 740 120 L 740 140 Z" fill="#bbf7d0"/>
  <path d="M 720 120 L 720 140 L 740 140" fill="none" stroke="#86efac" stroke-width="1.5"/>
  <text x="655" y="142" text-anchor="middle" class="t-h" fill="#15803d">plan-ready.md</text>
  <text x="655" y="160" text-anchor="middle" class="t-b">强制 12 段实现交接</text>
  <text x="655" y="178" text-anchor="middle" class="t-b">→ 唯一上下文桥梁</text>
  <text x="655" y="198" text-anchor="middle" class="t-b">翻译后跑 5 项自检</text>
  <rect x="570" y="232" width="170" height="56" rx="6" fill="#fefce8" stroke="#eab308"/>
  <text x="655" y="252" text-anchor="middle" class="t-h" fill="#92400e">5 项自检（spec.md:181）</text>
  <text x="655" y="270" text-anchor="middle" class="t-b">Source Coverage 完整</text>
  <text x="655" y="283" text-anchor="middle" class="t-b">Slices 含 TDD/验证/风险 · Handoff 非 TODO</text>
  <rect x="780" y="120" width="195" height="280" rx="10" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="877" y="142" text-anchor="middle" class="t-h" fill="#6b21a8">Superpowers 消费</text>
  <text x="877" y="158" text-anchor="middle" class="t-b">writing-plans + TDD</text>
  <rect x="794" y="174" width="167" height="48" rx="6" fill="#ffffff" stroke="#e9d5ff"/>
  <text x="802" y="190" class="t-sec" font-weight="600">build 前置 3 检查</text>
  <text x="802" y="205" class="t-b">Project Context / Rules /</text>
  <text x="802" y="217" class="t-b">Handoff 必须 非 TODO</text>
  <rect x="794" y="228" width="167" height="48" rx="6" fill="#ffffff" stroke="#e9d5ff"/>
  <text x="802" y="244" class="t-sec" font-weight="600">slice 展开</text>
  <text x="802" y="259" class="t-b">每 slice → 2-5 分钟</text>
  <text x="802" y="271" class="t-b">checkbox 步骤</text>
  <rect x="794" y="282" width="167" height="48" rx="6" fill="#ffffff" stroke="#e9d5ff"/>
  <text x="802" y="298" class="t-sec" font-weight="600">TDD 节奏</text>
  <text x="802" y="313" class="t-b">先写失败测试 → 实现</text>
  <text x="802" y="325" class="t-b">→ 每 task 一 commit</text>
  <rect x="794" y="336" width="167" height="48" rx="6" fill="#ffffff" stroke="#e9d5ff"/>
  <text x="802" y="352" class="t-sec" font-weight="600">产出</text>
  <text x="802" y="367" class="t-b">docs/superpowers/plans/</text>
  <text x="802" y="379" class="t-b">YYYY-MM-DD-&lt;变更&gt;.md</text>
  <line x1="250" y1="200" x2="286" y2="200" stroke="#ea580c" stroke-width="2" marker-end="url(#a-orange)"/>
  <text x="268" y="192" text-anchor="middle" class="t-edge-em">输入</text>
  <line x1="530" y1="170" x2="566" y2="170" stroke="#16a34a" stroke-width="2" marker-end="url(#a-green)"/>
  <text x="548" y="162" text-anchor="middle" class="t-edge-em">产出</text>
  <line x1="740" y1="170" x2="776" y2="170" stroke="#9333ea" stroke-width="2" marker-end="url(#a-orange)"/>
  <text x="758" y="162" text-anchor="middle" class="t-edge-em">消费</text>
  <rect x="30" y="440" width="945" height="138" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="48" y="464" class="t-h" fill="#991b1b">⚠ 为什么必须翻译？——编排器模式的根本代价</text>
  <text x="48" y="488" class="t-b">templates/spec.md:82 与 build.md 反复强调：「Superpowers 本身不会自动读取 openspec/config.yaml；上下文必须通过 plan-ready.md 传递给 writing-plans」。</text>
  <text x="48" y="508" class="t-b">→ 即：若不显式把 OpenSpec 的项目规则复制进 plan-ready，这些规则就会在 Superpowers 执行时丢失。这是「两个独立系统拼接」必须付出的代价。</text>
  <text x="48" y="536" class="t-b" font-weight="600" fill="#991b1b">格式漂移发现（实现不一致）：</text>
  <text x="48" y="554" class="t-b">真实存档 openspec/changes/archive/.../plan-ready.md 是旧版 amendment 驱动格式（## 来源 / ## Amendments / ## 追加实现步骤），缺 Source Coverage / File Responsibility Map / Implementation Slices(TDD) /</text>
  <text x="48" y="570" class="t-b">Verification Plan / Superpowers Handoff 段 —— 说明 12 段硬化格式是 0.4.x 引入的，比该存档新（实现与历史产物的漂移）。</text>
</svg>