  <text x="910.0" y="358" text-anchor="middle" class="t-sticky" transform="rotate(-3 910.0 370.0)">适合：中型团队/严肃工程</text>
  <text x="910.0" y="372" text-anchor="middle" class="t-sticky" transform="rotate(-3 910.0 370.0)">要可检查的意图契约</text>
  <text x="910.0" y="386" text-anchor="middle" class="t-sticky" transform="rotate(-3 910.0 370.0)">能承担引擎维护</text>
