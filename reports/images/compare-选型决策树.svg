  <polygon points="127.2,663.4 302.2,611.4 477.2,663.4 302.2,715.4" fill="none" stroke="#2b2b2b" stroke-width="1" opacity="0.3" transform="rotate(0.5 300 665)"/>
  <text x="300" y="657" text-anchor="middle" class="t-q">能接受高复杂度？</text>
  <text x="300" y="675" text-anchor="middle" class="t-q">（9 领域 ~110 .ts）</text>
  <line x1="475" y1="665" x2="548" y2="665" stroke="#2b2b2b" stroke-width="1.8" stroke-linecap="round" marker-end="url(#hd-green)"/>
  <text x="510" y="658" text-anchor="middle" class="t-yn" fill="#4a7c59">是</text>
  <rect x="550" y="630" width="230" height="70" rx="7" fill="#eaf3ec" stroke="#4a7c59" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="rotate(-0.8 665.0 665.0)"/>
  <rect x="552.2" y="628.4" width="230" height="70" rx="7" fill="none" stroke="#4a7c59" stroke-width="1" opacity="0.3" transform="rotate(-0.8 665.0 665.0)"/>
  <text x="665" y="658" text-anchor="middle" class="t-out" fill="#4a7c59">✓ comet</text>
  <text x="665" y="680" text-anchor="middle" class="t-why">Node-only 平台 · 独有 Skill 创作 · 33 平台</text>
  <path d="M 820,635 L 991,635 L 1000,644 L 1000,695 L 820,695 Z" fill="#fff4c2" stroke="#d9c27a" stroke-width="1.3" transform="rotate(-3 910.0 665.0)"/>
  <path d="M 991,635 L 991,644 L 1000,644" fill="none" stroke="#d9c27a" stroke-width="1.1" transform="rotate(-3 910.0 665.0)"/>
  <text x="910.0" y="653" text-anchor="middle" class="t-sticky" transform="rotate(-3 910.0 665.0)">适合：平台团队/工具建设</text>
  <text x="910.0" y="667" text-anchor="middle" class="t-sticky" transform="rotate(-3 910.0 665.0)">要可恢复·可校验·可发行</text>
  <text x="910.0" y="681" text-anchor="middle" class="t-sticky" transform="rotate(-3 910.0 665.0)">Windows 原生刚需</text>
  <path d="M 300 717 Q 300 760 540 760 L 866 760 L 866 705" fill="none" stroke="#2b2b2b" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="5,4" marker-end="url(#hd-ink)"/>
  <text x="312" y="740" class="t-yn" fill="#b85450">否</text>
  <rect x="866" y="670" width="200" height="60" rx="7" fill="#f1eef7" stroke="#6b5b95" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" transform="rotate(0.8 966.0 700.0)"/>
  <rect x="868.2" y="668.4" width="200" height="60" rx="7" fill="none" stroke="#6b5b95" stroke-width="1" opacity="0.3" transform="rotate(0.8 966.0 700.0)"/>
  <text x="966" y="695" text-anchor="middle" class="t-out" fill="#6b5b95" font-size="14">↩ spec-superflow</text>
  <text x="966" y="714" text-anchor="middle" class="t-why">（降级选择）</text>
  <rect x="60" y="790" width="1080" height="46" rx="8" fill="#fff8e1" stroke="#d9c27a"/>
  <text x="78" y="812" class="t-cap" font-weight="700" fill="#5a4a2a">核心推荐：</text>
  <text x="160" y="812" class="t-cap">三者不互斥 —— 理想形态是 contract 锁意图 + plan 给细节 + handoff 防漂移；comet 的 build 仍依赖 Superpowers plan，故可与 SP 并存</text>
  <text x="78" y="828" class="t-cap" fill="#6b6256">组合建议：openflow 做轻量编排入门 → spec-superflow 做工程主力 → comet 做平台化/发行；按团队规模与复杂度耐受度递进采用</text>
</svg>