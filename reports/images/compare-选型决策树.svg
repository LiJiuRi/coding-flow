  <text x="300" y="505" text-anchor="middle" class="t-q">需 Skill 创作/分发 + 确定性</text>
  <text x="300" y="523" text-anchor="middle" class="t-q">可恢复 + Windows 原生？</text>
  <text x="300" y="540" text-anchor="middle" class="t-q">（需 33 平台？）</text>
