  <text x="910.0" y="517" text-anchor="middle" class="t-sticky" transform="rotate(3 910.0 515.0)">团队不适应铁律约束</text>
  <text x="910.0" y="531" text-anchor="middle" class="t-sticky" transform="rotate(3 910.0 515.0)">或直接用 OpenSpec+SP</text>
