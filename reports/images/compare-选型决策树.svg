  <rect x="552.2" y="198.4" width="230" height="70" rx="7" fill="none" stroke="#3b6ea5" stroke-width="1" opacity="0.3" transform="rotate(0.8 665.0 235.0)"/>
  <text x="665" y="228" text-anchor="middle" class="t-out" fill="#3b6ea5">✓ openflow</text>
  <text x="665" y="250" text-anchor="middle" class="t-why">极薄编排器 · 零嵌入 · 平台 4</text>
  <path d="M 820,205 L 991,205 L 1000,214 L 1000,265 L 820,265 Z" fill="#fff4c2" stroke="#d9c27a" stroke-width="1.3" transform="rotate(3 910.0 235.0)"/>
