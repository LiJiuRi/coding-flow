  <rect x="552.2" y="333.4" width="230" height="70" rx="7" fill="none" stroke="#6b5b95" stroke-width="1" opacity="0.3" transform="rotate(-0.8 665.0 370.0)"/>
  <text x="665" y="363" text-anchor="middle" class="t-out" fill="#6b5b95">✓ spec-superflow</text>
  <text x="665" y="385" text-anchor="middle" class="t-why">源码融合 · 软+硬门禁 · 平台 7+</text>
  <path d="M 820,340 L 991,340 L 1000,349 L 1000,400 L 820,400 Z" fill="#fff4c2" stroke="#d9c27a" stroke-width="1.3" transform="rotate(-3 910.0 370.0)"/>
