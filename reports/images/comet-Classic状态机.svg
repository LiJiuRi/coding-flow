<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .t-title { font-size: 19px; font-weight: 600; fill: #111827; }
    .t-sub { font-size: 12.5px; fill: #6b7280; }
    .t-st { font-size: 13.5px; font-weight: 600; fill: #111827; }
    .t-st-sub { font-size: 10.5px; fill: #475569; }
    .t-edge { font-size: 10.5px; fill: #1e3a8a; }
    .t-edge-em { font-size: 11px; font-weight: 600; }
    .t-note { font-size: 11px; fill: #6b7280; }
  </style>
  <rect width="1200" height="600" fill="#ffffff"/>
  <defs>
    <marker id="a-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
    <marker id="a-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#dc2626"/></marker>
    <marker id="a-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#9333ea"/></marker>
    <marker id="a-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker>
    <marker id="a-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#94a3b8"/></marker>
  </defs>
  <text x="600" y="30" text-anchor="middle" class="t-title">comet Classic 运行时：8 事件驱动的确定性状态机（纯函数 · 无 LLM · 无网络）</text>
  <text x="600" y="50" text-anchor="middle" class="t-sub">domains/comet-classic/classic-transitions.ts · 5 phase + archived · 每个事件有前置 guard · effects 经 setField 记录到 state-events.jsonl</text>
  <rect x="45.0" y="190.0" width="130" height="60" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.6"/>
  <text x="110" y="216" text-anchor="middle" class="t-st">open</text>
  <text x="110" y="232" text-anchor="middle" class="t-st-sub">提案·建 .comet.yaml</text>
  <rect x="255.0" y="190.0" width="130" height="60" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.6"/>
  <text x="320" y="216" text-anchor="middle" class="t-st">design</text>
  <text x="320" y="232" text-anchor="middle" class="t-st-sub">设计·evidence</text>
  <rect x="475.0" y="190.0" width="130" height="60" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.6"/>
  <text x="540" y="216" text-anchor="middle" class="t-st">build</text>
  <text x="540" y="232" text-anchor="middle" class="t-st-sub">实现·TDD/隔离</text>
  <rect x="695.0" y="190.0" width="130" height="60" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.6"/>
  <text x="760" y="216" text-anchor="middle" class="t-st">verify</text>
  <text x="760" y="232" text-anchor="middle" class="t-st-sub">验证·4 维度</text>
  <rect x="905.0" y="190.0" width="130" height="60" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.6"/>
  <text x="970" y="216" text-anchor="middle" class="t-st">archive</text>
  <text x="970" y="232" text-anchor="middle" class="t-st-sub">归档·sync</text>
  <rect x="1070.0" y="190.0" width="120" height="60" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="2.2"/>
  <text x="1130" y="216" text-anchor="middle" class="t-st">archived</text>
  <text x="1130" y="232" text-anchor="middle" class="t-st-sub">终态</text>
  <line x1="177" y1="220" x2="253" y2="220" stroke="#2563eb" stroke-width="1.7" marker-end="url(#a-blue)"/>
  <text x="215.0" y="200" text-anchor="middle" class="t-edge" font-weight="600">open-complete</text>
  <text x="215.0" y="213" text-anchor="middle" class="t-edge" fill="#475569">[open-artifacts-present]</text>
  <line x1="387" y1="220" x2="473" y2="220" stroke="#2563eb" stroke-width="1.7" marker-end="url(#a-blue)"/>
  <text x="430.0" y="200" text-anchor="middle" class="t-edge" font-weight="600">design-complete</text>
  <text x="430.0" y="213" text-anchor="middle" class="t-edge" fill="#475569">[design-evidence-present]</text>
  <line x1="607" y1="220" x2="693" y2="220" stroke="#2563eb" stroke-width="1.7" marker-end="url(#a-blue)"/>
  <text x="650.0" y="200" text-anchor="middle" class="t-edge" font-weight="600">build-complete</text>
  <text x="650.0" y="213" text-anchor="middle" class="t-edge" fill="#475569">[build-decisions-selected]</text>
  <line x1="827" y1="220" x2="903" y2="220" stroke="#2563eb" stroke-width="1.7" marker-end="url(#a-blue)"/>
  <text x="865.0" y="200" text-anchor="middle" class="t-edge" font-weight="600">verify-pass</text>
  <text x="865.0" y="213" text-anchor="middle" class="t-edge" fill="#475569">[verification-passed]</text>
  <line x1="1037" y1="220" x2="1069" y2="220" stroke="#16a34a" stroke-width="1.9" marker-end="url(#a-green)"/>
  <text x="1053" y="213" text-anchor="middle" class="t-edge-em" fill="#15803d">archived</text>
  <path d="M 760 251 C 760 305, 540 305, 540 251" fill="none" stroke="#dc2626" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#a-red)"/>
  <text x="650" y="312" text-anchor="middle" class="t-edge-em" fill="#b91c1c">verify-fail [verification-failed] → verify_result=fail</text>
  <path d="M 540 189 C 540 140, 320 140, 320 189" fill="none" stroke="#9333ea" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#a-purple)"/>
  <text x="430" y="132" text-anchor="middle" class="t-edge-em" fill="#6b21a8">preset-escalate [preset-workflow] hotfix/tweak→full</text>
  <path d="M 970 189 C 970 80, 320 80, 320 189" fill="none" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-purple)"/>
  <text x="645" y="74" text-anchor="middle" class="t-edge-em" fill="#6b21a8">archive-reopen（重新打开修订）</text>
  <rect x="60" y="370" width="1080" height="74" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="74" y="390" class="t-st" fill="#15803d">2 个预设路径（preset）· intent-frame 路由</text>
  <text x="74" y="411" class="t-note" font-weight="600">hotfix：</text>
  <text x="124" y="411" class="t-note">open → build（跳过 design）→ verify → archive　　</text>
  <text x="430" y="411" class="t-note" font-weight="600">tweak：</text>
  <text x="478" y="411" class="t-note">open → OpenSpec apply（delta spec 一等公民）→ verify → archive</text>
  <text x="74" y="430" class="t-note" fill="#6b21a8">preset-escalate 是唯一合法升级通道：原子置 workflow/classic_profile=full、回退 phase=design、清 design_doc（直接 set phase 被 state machine 硬拦截）</text>
  <rect x="60" y="466" width="1080" height="118" rx="10" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="76" y="488" class="t-st" fill="#1e3a8a">三层冗余强制（build 的 6 决策字段在三处独立校验）</text>
  <text x="76" y="510" class="t-note" font-weight="600">① transition 入口</text>
  <text x="180" y="510" class="t-note">requireBuildDecisions —— 查转换表 + guard + 应用 effects</text>
  <text x="76" y="528" class="t-note" font-weight="600">② guard --apply</text>
  <text x="180" y="528" class="t-note">CLASSIC_GUARD_TRANSITION_EVENT 复用同一转换表（source=comet-guard）</text>
  <text x="76" y="546" class="t-note" font-weight="600">③ hook-guard PreToolUse</text>
  <text x="180" y="546" class="t-note">物理拦截文件写入 —— open/design/archive 阶段写源码直接 BLOCK（唯一不依赖 agent 主动调用的硬门禁）</text>
  <line x1="76" y1="558" x2="1124" y2="558" stroke="#e5e7eb"/>
  <text x="76" y="576" class="t-note" fill="#15803d">确定性收益：</text>
  <text x="160" y="576" class="t-note">effects 经 setField 只在值变化时记录 {field,from,to} → state-events.jsonl 审计 · 三文件解耦支持精确恢复（trajectory/checkpoint）· 7 个 runtime eval 做差分兼容测试</text>
</svg>