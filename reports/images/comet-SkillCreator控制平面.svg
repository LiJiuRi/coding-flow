<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 840" width="900" height="840">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .t-title { font-size: 19px; font-weight: 600; fill: #111827; }
    .t-sub { font-size: 12.5px; fill: #6b7280; }
    .t-st { font-size: 14px; font-weight: 600; fill: #111827; }
    .t-b { font-size: 11.5px; fill: #475569; }
    .t-edge { font-size: 11.5px; fill: #1e3a8a; }
    .t-grp { font-size: 12px; font-weight: 600; letter-spacing: 1px; }
    .t-note { font-size: 11px; fill: #6b7280; }
  </style>
  <rect width="900" height="840" fill="#ffffff"/>
  <defs>
    <marker id="a-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
    <marker id="a-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#94a3b8"/></marker>
    <marker id="a-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ea580c"/></marker>
    <marker id="a-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker>
  </defs>
  <text x="450" y="30" text-anchor="middle" class="t-title">comet 独有创新：Skill Creator + Bundle 控制平面</text>
  <text x="450" y="50" text-anchor="middle" class="t-sub">把「工作流想法」变成可分发、可校验、可发行的 Skill Package（openflow/spec-superflow 均无此能力）</text>
  <rect x="30" y="72" width="840" height="296" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="46" y="91" class="t-grp" fill="#1e40af">① 创作阶段</text>
  <rect x="30" y="372" width="840" height="240" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="46" y="391" class="t-grp" fill="#9a3412">② 编译 · 评估 · 审查</text>
  <rect x="30" y="616" width="840" height="170" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="46" y="635" class="t-grp" fill="#166534">③ 发行 · 分发</text>
  <rect x="190.0" y="90" width="380" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.6"/>
  <text x="380" y="113" text-anchor="middle" class="t-st">工作流想法（自然语言 spec 描述）</text>
  <text x="380" y="132" text-anchor="middle" class="t-b">用户用自然语言描述想要的工作流 / Skill</text>
  <line x1="380" y1="150" x2="380" y2="185" stroke="#2563eb" stroke-width="1.8" marker-end="url(#a-blue)"/>
  <rect x="190.0" y="175" width="380" height="60" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.6"/>
  <text x="380" y="198" text-anchor="middle" class="t-st">/comet-any（Skill Creator 入口）</text>
  <text x="380" y="217" text-anchor="middle" class="t-b">assets/skills/comet-any · reference/authoring-protocol.json</text>
  <line x1="380" y1="235" x2="380" y2="270" stroke="#2563eb" stroke-width="1.8" marker-end="url(#a-blue)"/>
  <rect x="190.0" y="260" width="380" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.6"/>
  <text x="380" y="283" text-anchor="middle" class="t-st">workflow-contract（单一事实源深模块 · 6ts）</text>
  <text x="380" y="302" text-anchor="middle" class="t-b">规范化 contract / phase / step · 是后续所有阶段的契约源</text>
  <line x1="380" y1="320" x2="380" y2="355" stroke="#2563eb" stroke-width="1.8" marker-end="url(#a-blue)"/>
  <rect x="190.0" y="345" width="380" height="60" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.6"/>
  <text x="380" y="368" text-anchor="middle" class="t-st">draft（Bundle 草稿）</text>
  <text x="380" y="387" text-anchor="middle" class="t-b">domains/bundle · 按 contract 生成草稿结构</text>
  <line x1="380" y1="405" x2="380" y2="440" stroke="#2563eb" stroke-width="1.8" marker-end="url(#a-blue)"/>
  <rect x="190.0" y="430" width="380" height="60" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.6"/>
  <text x="380" y="453" text-anchor="middle" class="t-st">compile（编译）</text>
  <text x="380" y="472" text-anchor="middle" class="t-b">esbuild 打包 · 生成跨平台可执行 skill 包（Node-only .mjs）</text>
  <line x1="380" y1="490" x2="380" y2="525" stroke="#2563eb" stroke-width="1.8" marker-end="url(#a-blue)"/>
  <rect x="190" y="515" width="240" height="60" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.6"/>
  <text x="310" y="538" text-anchor="middle" class="t-st">eval（评估）</text>
  <text x="310" y="557" text-anchor="middle" class="t-b">实际运行 skill · 采证</text>
  <rect x="470" y="515" width="220" height="60" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.6"/>
  <text x="580" y="538" text-anchor="middle" class="t-st">engine（执行引擎）</text>
  <text x="580" y="557" text-anchor="middle" class="t-b">loop/run-store/resolver/guardrails/evals</text>
  <line x1="430" y1="545" x2="466" y2="545" stroke="#ea580c" stroke-width="1.7" marker-end="url(#a-orange)"/>
  <line x1="466" y1="535" x2="430" y2="535" stroke="#ea580c" stroke-width="1.7" marker-end="url(#a-orange)"/>
  <text x="448" y="528" text-anchor="middle" class="t-edge" fill="#9a3412">跑</text>
  <line x1="380" y1="575" x2="380" y2="610" stroke="#2563eb" stroke-width="1.8" marker-end="url(#a-blue)"/>
  <rect x="190.0" y="600" width="380" height="60" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.6"/>
  <text x="380" y="623" text-anchor="middle" class="t-st">review（审查）</text>
  <text x="380" y="642" text-anchor="middle" class="t-b">三级问题分级 · 禁表演式同意 · 不通过回 compile</text>
  <line x1="380" y1="660" x2="380" y2="695" stroke="#2563eb" stroke-width="1.8" marker-end="url(#a-blue)"/>
  <rect x="190.0" y="685" width="380" height="60" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.6"/>
  <text x="380" y="708" text-anchor="middle" class="t-st">publish（发布）</text>
  <text x="380" y="727" text-anchor="middle" class="t-b">app/commands/publish.ts · 版本化 + 注册</text>
  <line x1="380" y1="745" x2="380" y2="780" stroke="#2563eb" stroke-width="1.8" marker-end="url(#a-blue)"/>
  <rect x="190.0" y="770" width="380" height="60" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="1.6"/>
  <text x="380" y="793" text-anchor="middle" class="t-st">distribute → 33 平台 skill 产物</text>
  <text x="380" y="812" text-anchor="middle" class="t-b">copy/symlink 安装到 33 个 AI 编码平台</text>
  <rect x="660" y="120" width="200" height="100" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="760" y="142" text-anchor="middle" class="t-st" font-size="12">控制平面命令</text>
  <text x="672" y="162" class="t-b">comet creator · comet bundle</text>
  <text x="672" y="178" class="t-b">comet publish · comet skill</text>
  <text x="672" y="196" class="t-b">comet eval · comet update</text>
  <text x="672" y="214" class="t-b" fill="#6b21a8">/comet-any 统一入口</text>
</svg>