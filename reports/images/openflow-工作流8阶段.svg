<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 820" width="1000" height="820">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .t-title { font-size: 19px; font-weight: 600; fill: #111827; }
    .t-sub { font-size: 12.5px; fill: #6b7280; }
    .t-phase { font-size: 14px; font-weight: 600; fill: #111827; }
    .t-phase-sub { font-size: 11.5px; fill: #475569; }
    .t-tag { font-size: 11px; font-weight: 600; }
    .t-gate { font-size: 11.5px; font-weight: 600; fill: #92400e; }
    .t-edge { font-size: 11.5px; fill: #374151; }
    .t-edge-y { font-size: 11.5px; font-weight: 600; fill: #15803d; }
    .t-edge-n { font-size: 11.5px; font-weight: 600; fill: #b91c1c; }
  </style>
  <rect width="1000" height="820" fill="#ffffff"/>
  <defs>
    <marker id="a-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="a-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
    <marker id="a-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ea580c"/></marker>
    <marker id="a-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#9333ea"/></marker>
    <marker id="a-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker>
  </defs>
  <text x="500" y="30" text-anchor="middle" class="t-title">openflow 工作流：8 阶段 + 硬编码门禁（DEFAULT_GATES）</text>
  <text x="500" y="50" text-anchor="middle" class="t-sub">阶段见 src/core/skill-generator.ts PHASES · 门禁见 workflow-status.ts · 状态来源优先级：workflow-status.md &gt; 文件扫描 &gt; 会话记忆</text>
  <rect x="350" y="72" width="300" height="56" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="500.0" y="94" text-anchor="middle" class="t-phase">① init</text>
  <text x="500.0" y="112" text-anchor="middle" class="t-phase-sub">扫码 package.json/README/AGENTS.md → openspec/config.yaml</text>
  <text x="500.0" y="128" text-anchor="middle" class="t-phase-sub">只写 config.yaml + state；禁写代码/change</text>
  <line x1="500" y1="128" x2="500" y2="146" stroke="#64748b" stroke-width="1.6" marker-end="url(#a-gray)"/>
  <polygon points="370,172 500,146 630,172 500,198" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="500" y="171" text-anchor="middle" class="t-gate" font-size="11.5">门禁：config.yaml 存在？</text>
  <text x="500" y="185" text-anchor="middle" class="t-gate" font-size="10.5">(init 产出)</text>
  <text x="640" y="168" class="t-edge-n">否 → 强制 init</text>
  <line x1="500" y1="198" x2="500" y2="214" stroke="#64748b" stroke-width="1.6" marker-end="url(#a-gray)"/>
  <text x="510" y="211" class="t-edge-y">是</text>
  <rect x="300" y="218" width="380" height="76" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="490" y="236" text-anchor="middle" class="t-phase">② capture（提案捕获 · Step0 先查 config.yaml）</text>
  <line x1="490" y1="242" x2="490" y2="290" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="395" y="262" text-anchor="middle" class="t-phase-sub" font-weight="600">proposal</text>
  <text x="395" y="278" text-anchor="middle" class="t-phase-sub">3-5 问快速收敛</text>
  <text x="585" y="262" text-anchor="middle" class="t-phase-sub" font-weight="600">brainstorming</text>
  <text x="585" y="278" text-anchor="middle" class="t-phase-sub">一问一答+方案权衡</text>
  <rect x="730" y="226" width="180" height="60" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="820" y="248" text-anchor="middle" class="t-phase" fill="#92400e">③ grill（可选）</text>
  <text x="820" y="264" text-anchor="middle" class="t-phase-sub">对抗性提问·每问附推荐答案</text>
  <text x="820" y="278" text-anchor="middle" class="t-phase-sub">非门禁 · 追加 grill-me 决策记录</text>
  <path d="M 680 256 L 730 256" fill="none" stroke="#eab308" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a-orange)"/>
  <text x="705" y="250" text-anchor="middle" class="t-edge" fill="#92400e">可选</text>
  <line x1="490" y1="294" x2="490" y2="312" stroke="#64748b" stroke-width="1.6" marker-end="url(#a-gray)"/>
  <path d="M 820 286 L 820 302 L 490 302" fill="none" stroke="#eab308" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="330" y="314" width="340" height="70" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="500.0" y="336" text-anchor="middle" class="t-phase">④ spec（翻译层·产品核心）</text>
  <text x="500.0" y="354" text-anchor="middle" class="t-phase-sub">调 OpenSpec CLI 生成规格 → 翻译 7 规则 → plan-ready.md（强制 12 段）</text>
  <text x="500.0" y="370" text-anchor="middle" class="t-phase-sub">产出 proposal/design/specs/tasks + plan-ready · 翻译后 5 项自检</text>
  <rect x="578" y="320" width="84" height="17" rx="4" fill="#dc2626" opacity="0.16"/>
  <text x="620" y="332" text-anchor="middle" class="t-tag" fill="#dc2626">NO CODE</text>
  <line x1="500" y1="384" x2="500" y2="402" stroke="#64748b" stroke-width="1.6" marker-end="url(#a-gray)"/>
  <polygon points="345,428 500,400 655,428 500,456" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="500" y="427" text-anchor="middle" class="t-gate" font-size="11.5">门禁：plan-ready 完整 + 用户确认？</text>
  <text x="500" y="441" text-anchor="middle" class="t-gate" font-size="10.5">(DP · 5 项自检全过)</text>
  <text x="665" y="424" class="t-edge-n">否 → 回 spec 修订</text>
  <line x1="500" y1="456" x2="500" y2="472" stroke="#64748b" stroke-width="1.6" marker-end="url(#a-gray)"/>
  <text x="510" y="469" class="t-edge-y">是</text>
  <rect x="330" y="474" width="340" height="70" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="500.0" y="496" text-anchor="middle" class="t-phase">⑥ build（委托 Superpowers）</text>
  <text x="500.0" y="514" text-anchor="middle" class="t-phase-sub">plan-ready → writing-plans + TDD（先失败测试→实现→每 task 一 commit）</text>
  <text x="500.0" y="530" text-anchor="middle" class="t-phase-sub">前置 3 检查；slice 展开 2-5 分钟 checkbox · 唯一默认可写代码</text>
  <rect x="578" y="480" width="84" height="17" rx="4" fill="#16a34a" opacity="0.16"/>
  <text x="620" y="492" text-anchor="middle" class="t-tag" fill="#16a34a">可写代码</text>
  <rect x="730" y="480" width="180" height="58" rx="8" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="820" y="502" text-anchor="middle" class="t-phase" fill="#6b21a8">⑤ amend（受控修订）</text>
  <text x="820" y="518" text-anchor="middle" class="t-phase-sub">活跃 change/plan-ready 受控改</text>
  <text x="820" y="532" text-anchor="middle" class="t-phase-sub">已归档不可 amend · 回 build</text>
  <path d="M 670 502 L 730 502" fill="none" stroke="#9333ea" stroke-width="1.5" marker-end="url(#a-purple)"/>
  <path d="M 730 516 L 670 516" fill="none" stroke="#9333ea" stroke-width="1.5" marker-end="url(#a-purple)"/>
  <text x="700" y="472" text-anchor="middle" class="t-edge" fill="#6b21a8">修订/回环</text>
  <line x1="500" y1="544" x2="500" y2="562" stroke="#64748b" stroke-width="1.6" marker-end="url(#a-gray)"/>
  <polygon points="335,588 500,560 665,588 500,616" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="500" y="587" text-anchor="middle" class="t-gate" font-size="11.5">门禁：全 task 勾选 + OpenSpec task 同步？</text>
  <text x="500" y="601" text-anchor="middle" class="t-gate" font-size="10.5">(build 完成条件)</text>
  <text x="675" y="584" class="t-edge-n">否 → 回 build</text>
  <line x1="500" y1="616" x2="500" y2="632" stroke="#64748b" stroke-width="1.6" marker-end="url(#a-gray)"/>
  <text x="510" y="629" class="t-edge-y">是</text>
  <rect x="330" y="634" width="340" height="62" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="500.0" y="656" text-anchor="middle" class="t-phase">⑦ close（最严门禁）</text>
  <text x="500.0" y="674" text-anchor="middle" class="t-phase-sub">验证一致性 + 归档 · 不改代码</text>
  <text x="500.0" y="690" text-anchor="middle" class="t-phase-sub">MODIFIED/REMOVED capability 必须先有 spec.md 才能归档</text>
  <rect x="578" y="640" width="84" height="17" rx="4" fill="#dc2626" opacity="0.16"/>
  <text x="620" y="652" text-anchor="middle" class="t-tag" fill="#dc2626">NO CODE</text>
  <line x1="500" y1="696" x2="500" y2="714" stroke="#64748b" stroke-width="1.6" marker-end="url(#a-gray)"/>
  <polygon points="350,740 500,714 650,740 500,766" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="500" y="739" text-anchor="middle" class="t-gate" font-size="11.5">门禁：归档依赖检查（最严）</text>
  <text x="500" y="753" text-anchor="middle" class="t-gate" font-size="10.5">否则禁止 openspec archive</text>
  <text x="660" y="736" class="t-edge-n">否 → 阻塞</text>
  <line x1="500" y1="766" x2="500" y2="788" stroke="#16a34a" stroke-width="1.9" marker-end="url(#a-green)"/>
  <text x="510" y="783" class="t-edge-y">是</text>
  <text x="500" y="808" text-anchor="middle" class="t-phase" fill="#15803d">✓ archived（归档完成）</text>
  <text x="40" y="100" class="t-sub" font-weight="600">产物主线</text>
  <text x="40" y="118" class="t-sub">openspec/config.yaml</text>
  <line x1="178" y1="114" x2="298" y2="114" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="40" y="262" class="t-sub">proposal.md</text>
  <line x1="120" y1="258" x2="298" y2="258" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="40" y="345" class="t-sub" font-weight="600" fill="#9a3412">plan-ready.md ★</text>
  <line x1="150" y1="341" x2="328" y2="341" stroke="#fed7aa" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="40" y="513" class="t-sub">superpowers/plans</text>
  <text x="40" y="529" class="t-sub">+ 代码 + tasks 勾选</text>
  <line x1="160" y1="525" x2="328" y2="525" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="40" y="668" class="t-sub">archive/ +</text>
  <text x="40" y="684" class="t-sub">close-issues.md</text>
  <line x1="140" y1="680" x2="328" y2="680" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
</svg>