  <text x="786" y="438" class="t-b">• app/ 只组合 domain/platform</text>
  <text x="786" y="454" class="t-b">• domain/ 不散落平台差异</text>
  <text x="786" y="470" class="t-b">• 改 runtime 源码必须构建同步</text>
