  <text x="56" y="522" class="t-h" fill="#1e3a8a">Node-only runtime（独有创新 · 消除 Bash/Git Bash/WSL 依赖）</text>
  <text x="56" y="542" class="t-b">domains/comet-classic（纯 TS 确定性状态机）→ esbuild 打包 → 7 个 Node .mjs 启动器 → skill 调用 node "$COMET_STATE" &lt;cmd&gt;</text>
  <text x="56" y="558" class="t-b">只依赖 Node.js · Windows 原生可用 · 无 LLM · 无网络 · 纯函数</text>
